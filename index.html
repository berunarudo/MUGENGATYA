<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>infinityガチャ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <h1>infinityガチャ</h1>
      <p class="subtitle">version 1.0.0</p>
    </header>

    <section class="game-layout">
      <aside class="panel side-panel">
        <h2>出現率</h2>
        <div id="probability-list" class="probability-list"></div>
      </aside>

      <section class="panel center-panel">
        <div class="center-header">
          <h2 id="center-title">ガチャ結果ログ</h2>
          <button type="button" id="center-back-button" class="back-button is-hidden">戻る</button>
        </div>
        <div id="center-view" class="center-view" aria-live="polite"></div>
      </section>

      <aside class="panel side-panel">
        <h2>所持情報</h2>
        <dl class="status-box">
          <div class="status-row">
            <dt>石</dt>
            <dd id="stone-count">0</dd>
          </div>
          <div class="status-row">
            <dt>次の回復</dt>
            <dd id="recovery-timer">10.0秒</dd>
          </div>
          <div class="status-row">
            <dt>総ガチャ回数</dt>
            <dd id="total-gacha-count">0</dd>
          </div>
          <div class="status-row">
            <dt>総ハズレ回数</dt>
            <dd id="total-miss-count">0</dd>
          </div>
          <div class="status-row">
            <dt>総バグ撃破数</dt>
            <dd id="total-bug-defeats">0</dd>
          </div>
        </dl>

        <div class="menu-box">
          <h3>メニュー</h3>
          <button type="button" class="menu-button js-menu-button" data-menu="relics">遺物</button>
          <button type="button" class="menu-button js-menu-button" data-menu="status">ステータス</button>
          <button type="button" class="menu-button js-menu-button" data-menu="altar">祭壇</button>
          <button type="button" class="menu-button js-menu-button" data-menu="decompose">分解</button>
          <button type="button" class="menu-button js-menu-button" data-menu="achievements">実績</button>
          <button type="button" class="menu-button js-menu-button" data-menu="settings">設定</button>
        </div>
      </aside>
    </section>

    <footer class="game-footer">
      <button type="button" id="gacha-button" class="primary-button">ガチャを引く</button>
      <div id="long-press-status" class="long-press-status">万里の遺物: 未所持 / 長押し無効</div>
      <div id="batch-draw-buttons" class="batch-draw-buttons"></div>
      <button type="button" id="reset-button" class="reset-button">データリセット</button>
    </footer>
  </main>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/decompose.js"></script>
  <script src="js/gacha.js"></script>
  <script src="js/dungeon.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/infinity.js"></script>
  <script src="js/altar.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
